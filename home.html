<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Justin Ayala — Portfolio</title>
    <link rel="stylesheet" href="https://unpkg.com/7.css@0.21.1/dist/7.scoped.css">
    <link rel="stylesheet" href="home.css">
</head>

<body class="desktop">
    <main class="desktop-area win7">
        <section class="window active win7-window win-welcome">
            <div class="title-bar">
                <h2 id="win-welcome-title" class="title-bar-text">Welcome!</h2>
                <div class="title-bar-controls">
                    <button type="button" aria-label="Minimize"></button>
                    <button type="button" aria-label="Maximize"></button>
                    <button type="button" aria-label="Close"></button>
                </div>
            </div>
            <div class="window-body win7-body win7-body--welcome">
                <div class="avatar"></div>
                <p class="name">Justin Ayala</p>
                <p class="tagline">Web Designer</p>
                <p class="welcome-text">Welcome to my portfolio! Here you can find samples of my previous projects such
                    as Figma prototypes, websites, and more. Feel free to stick around and enjoy my website!</p>
            </div>
        </section>

        <section class="window active win7-window win-me">
            <div class="title-bar">
                <h2 id="win-me-title" class="title-bar-text">Me</h2>
                <div class="title-bar-controls">
                    <button type="button" aria-label="Minimize"></button>
                    <button type="button" aria-label="Maximize"></button>
                    <button type="button" aria-label="Close"></button>
                </div>
            </div>
            <div class="window-body win7-body win7-body--center">
                <a class="tile-link" href="aboutme.html">
                    <span class="tile-label">About Me</span>
                    <span class="tile tile--about">
                        <img src="imgs/aboutme.png" width="72" height="72" alt="">
                    </span>
                </a>
            </div>
        </section>

        <section class="window active win7-window win-links">
            <div class="title-bar">
                <h2 id="win-links-title" class="title-bar-text">Links</h2>
                <div class="title-bar-controls">
                    <button type="button" aria-label="Minimize"></button>
                    <button type="button" aria-label="Maximize"></button>
                    <button type="button" aria-label="Close"></button>
                </div>
            </div>
            <div class="window-body win7-body win7-body--links">
                <a class="tile-link tile-link--horizontal" href="programming.html">
                    <span class="tile tile--wide">
                        <img src="imgs/computadora.png" width="100" height="80" alt="">
                    </span>
                    <span class="tile-label">Programming</span>
                </a>
                <a class="tile-link tile-link--horizontal" href="writing.html">
                    <span class="tile tile--wide">
                        <img src="imgs/write.png" width="100" height="80" alt="">
                    </span>
                    <span class="tile-label">Writing</span>
                </a>
            </div>
        </section>

        <section class="window active win7-window win-socials">
            <div class="title-bar">
                <h2 id="win-socials-title" class="title-bar-text">Socials</h2>
                <div class="title-bar-controls">
                    <button type="button" aria-label="Minimize"></button>
                    <button type="button" aria-label="Maximize"></button>
                    <button type="button" aria-label="Close"></button>
                </div>
            </div>
            <div class="window-body win7-body win7-body--socials">
                <a class="social-link" href="https://github.com/JustinSabangan" title="GitHub">
                    <img src="imgs/github.svg" width="88" height="88" alt="GitHub">
                </a>
                <a class="social-link" href="#" title="LinkedIn">
                    <img src="imgs/linkedin.png" width="88" height="88" alt="LinkedIn">
                </a>
            </div>
        </section>

        <section class="window active win7-window win-contact">
            <div class="title-bar">
                <h2 id="win-contact-title" class="title-bar-text">Contact</h2>
                <div class="title-bar-controls">
                    <button type="button" aria-label="Minimize"></button>
                    <button type="button" aria-label="Maximize"></button>
                    <button type="button" aria-label="Close"></button>
                </div>
            </div>
            <div class="window-body win7-body win7-body--center">
                <a class="tile-link" href="contact.html">
                    <span class="tile-label">Contact</span>
                    <span class="tile tile--contact">
                        <img src="imgs/connection.png" width="80" height="80" alt="">
                    </span>
                </a>
            </div>
        </section>
    </main>
    <nav class="taskbar">
        <div class="taskbar-start">
            <button type="button" class="taskbar-start-btn" aria-label="Start">
                <img src="imgs/start.png" class="taskbar-orb" width="38" height="38" alt="" decoding="async">
            </button>
        </div>
        <div class="taskbar-quick">
            <a class="taskbar-pin" href="aboutme.html" title="About Me">
                <img src="imgs/placeholder.png" width="24" height="24" alt="">
            </a>
            <a class="taskbar-pin" href="programming.html" title="Programming">
                <img src="imgs/placeholder.png" width="24" height="24" alt="">
            </a>
            <a class="taskbar-pin" href="writing.html" title="Writing">
                <img src="imgs/placeholder.png" width="24" height="24" alt="">
            </a>
            <a class="taskbar-pin" href="contact.html" title="Contact">
                <img src="imgs/placeholder.png" width="24" height="24" alt="">
            </a>
        </div>
        <div class="taskbar-spacer"></div>
        <div class="taskbar-tray">
            <div class="taskbar-tray-glyphs">
                <span class="taskbar-tray-icon">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                        <path d="M4 6l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" />
                    </svg>
                </span>
                <span class="taskbar-tray-icon">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor">
                        <path d="M3 14V8l5-3 5 3v6H3z" opacity="0.85" />
                    </svg>
                </span>
                <span class="taskbar-tray-icon">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                        <rect x="2" y="5" width="6" height="5" rx="0.5" stroke="currentColor" stroke-width="1.2" />
                        <rect x="8" y="6" width="6" height="4" rx="0.5" stroke="currentColor" stroke-width="1.2" />
                    </svg>
                </span>
                <span class="taskbar-tray-icon">
                    <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                        <path d="M4 10c1.5-2 6.5-2 8 0" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" />
                        <path d="M6 6h4M8 4v4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" />
                    </svg>
                </span>
            </div>
            <div class="taskbar-clock">
                <time id="taskbar-time" datetime="">
                    <span class="taskbar-clock-time"></span>
                    <span class="taskbar-clock-date"></span>
                </time>
            </div>
        </div>
        <button type="button" class="show-desktop" aria-label="Show desktop"></button>
    </nav>

    <script src="draggable-windows.js"></script>
    

</body>

</html>
